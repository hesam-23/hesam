<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Contact Form with Hamburger Menu</title>
<!-- فونت منو -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
}

.mobile-container {
  position: relative;
  width: 391px;
  height: 1168px;
  border: 1px  #999;
  background-color: #c4c4c4;
  box-shadow:none
}

/* =======================
   NAVBAR با لوگو و همبرگر
======================= */
.navbar {
    height: 58px;
    background: #c4c4c4;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    position: relative;
    z-index: 10;
}

.nav-logo { height: 20px; }

.hamburger {
    width: 30px;
    height: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
}

.hamburger span {
    height: 3px;
    background: #000;
    border-radius: 2px;
    transition: 0.3s;
}

.hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(6px,-6px); }

/* =======================
   منوی کشویی
======================= */
.menu {
    position: fixed;
    top: 58px;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 391px;
    background: #ffffff; /* ⬅️ سفیدِ سفید */
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 0;
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
    z-index: 20;
}

.menu.open { opacity: 1; pointer-events: auto; }

.menu a {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    color: #000000;
    text-decoration: none;
    margin: 6px 0;
    text-transform: uppercase; /* ⬅️ حروف بزرگ */
        font-weight: 300; /* ⬅️ بولد رو برمی‌داره */

}

/* =======================
   Box3: تصویر بالا
======================= */
.image-top {
  top: 58px;
  width: 371px;
  height: 73px;
  position: absolute;
  left: 10px;
}

.image-top img { width: 100%; height: 100%; object-fit: cover; }

/* =======================
   Box4: فرم تماس
======================= */
.contact-section {
  top: 131px;
  width: 371px;
  height: 624px;
  background-color: #000;
  position: absolute;
  left: 10px;
  padding: 16px;
  box-sizing: border-box;
  overflow-y: auto;
}

.contact-section label {
  margin-top: 12px;
  margin-bottom: 4px;
  font-weight: bold;
  color: #fff;
}

.contact-section input,
.contact-section textarea,
.contact-section select {
  width: 100%;
  padding: 8px 8px 8px 40px;
  border: none;
  border-radius: 4px;
  margin-bottom: 12px;
  box-sizing: border-box;
  background-repeat: no-repeat;
  background-position: 8px center;
  background-size: 24px 16px;
}

.contact-section input { height: 36px; }
.contact-section textarea { height: 180px; resize: vertical; }

.phone-container { display: flex; gap: 8px; }
.phone-container select { width: 120px; height: 36px; font-size: 14px; padding-left: 28px; }
.phone-container input { flex: 1; }

.contact-section button {
  background: linear-gradient(90deg, #43b4d0, #36a0c1);
  color: #fff;
  border: none;
  padding: 14px;
  font-size: 16px;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 6px 10px rgba(0,0,0,0.25);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.contact-section button:hover {
  background: linear-gradient(90deg, #36a0c1, #2c8ca3);
  transform: translateY(-2px);
}

.contact-section button span { margin-left: 8px; font-weight: bold; }

/* =======================
   Box5: تصویر پایین
======================= */
.image-bottom {
  top: 740px;
  width: 371px;
  height: 73px;
  position: absolute;
  left: 10px;
}

.image-bottom img { width: 100%; height: 100%; object-fit: cover; }

/* =======================
   Box6: Footer
======================= */
.page-footer {
  top: 822px;
  width: 371px;
  height: 327px;
  position: absolute;
  left: 10px;
}

.page-footer img { width: 100%; height: 100%; object-fit: cover; }

</style>
</head>
<body>

<div class="mobile-container">

  <!-- NAVBAR با لوگو و همبرگر -->
  <div class="navbar">
    <img src="images/logo.png" alt="Logo" class="nav-logo">
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- منوی کشویی -->
 <div class="menu" id="menu">
  <a href="index.html">About Me</a>
  <a href="projects.html">My Projects</a>
  <a href="contact.html">My Contact</a>
</div>

  <!-- Box3 -->
  <div class="image-top">
    <img src="images/20.svg" alt="Top Image">
  </div>

  <!-- Box4: فرم تماس -->
  <div class="contact-section">
    <label for="first-name">First name *</label>
    <input type="text" id="first-name" placeholder="Enter your first name">

    <label for="last-name">Last name *</label>
    <input type="text" id="last-name" placeholder="Enter your last name">

    <label for="email">Email *</label>
    <input type="email" id="email" placeholder="Enter your email">

    <label for="phone">Phone</label>
    <div class="phone-container">
      <select id="country-code">
        <option value="+1" data-flag="https://flagcdn.com/us.svg">US +1</option>
        <option value="+44" data-flag="https://flagcdn.com/gb.svg">UK +44</option>
        <option value="+91" data-flag="https://flagcdn.com/in.svg">IN +91</option>
        <option value="+98" data-flag="https://flagcdn.com/ir.svg">IR +98</option>
      </select>
      <input type="tel" id="phone" placeholder="Enter your phone number">
    </div>

    <label for="message">Message *</label>
    <textarea id="message" placeholder="Write your message"></textarea>

    <button type="submit">Submit <span>→</span></button>
  </div>

  <!-- Box5 -->
  <div class="image-bottom">
    <img src="images/22.svg" alt="Bottom Image">
  </div>

  <!-- Box6 -->
  <div class="page-footer">
    <img src="images/21.svg" alt="Footer Image">
  </div>

</div>

<script>
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");

hamburger.addEventListener('click', () => {
  hamburger.classList.toggle("active");
  menu.classList.toggle("open");
});

// پرچم‌ها برای انتخاب کشور
const countrySelect = document.getElementById('country-code');
const phoneInput = document.getElementById('phone');

function updateFlag() {
  const selectedOption = countrySelect.selectedOptions[0];
  const flagUrl = selectedOption.dataset.flag;
  countrySelect.style.backgroundImage = `url(${flagUrl})`;
  phoneInput.value = selectedOption.value + ' ';
}
updateFlag();
countrySelect.addEventListener('change', updateFlag);
</script>

</body>
</html>
