<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Me – Mobile</title>

<!-- فونت منو -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* =======================
   ریست کلی
======================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* =======================
   بدنه اصلی
======================= */
body {
  background: #ffffff;
  display: flex;
  justify-content: center;
  font-family: 'Montserrat', sans-serif;
}

/* =======================
   کانتینر موبایل
======================= */
.box1 {
  width: 100%;
  max-width: 391px;
  background-color: #c4c4c4;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

/* =======================
   نوار بالا
======================= */
.box2 {
  width: 100%;
  height: 58px;
  background-color: #c4c4c4;
  display: flex;
  align-items: center;
  padding: 0 16px;
  position: relative;
  z-index: 100;
}

.nav-container {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-logo {
  height: 20px;
}

/* =======================
   منوی همبرگری
======================= */
.hamburger {
  width: 30px;
  height: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  height: 3px;
  background: #000;
  border-radius: 2px;
  transition: all 0.3s ease;
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

/* =======================
   منوی کشویی
======================= */
.dropdown-menu {
  position: fixed;
  top: 58px;
  left: 50%;
  transform: translate(-50%, -20px);
  width: 100%;
  max-width: 391px;
    background: #ffffff; /* ⬅️ سفیدِ سفید */
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 0;
  opacity: 0;
  pointer-events: none;
  transition: all 0.4s ease;
  z-index: 1000;
}

.dropdown-menu.open {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, 0);
}

.dropdown-menu a {
  font-family: 'Montserrat', sans-serif;
  font-size: 2rem;
  font-weight: 300;
  color: #000000;
  text-decoration: none;
  margin: 6px 0;
  transition: transform 0.25s ease, color 0.25s ease;
  text-transform: uppercase; /* حروف بزرگ */
  letter-spacing: 1px;
  

}

.dropdown-menu a:active {
  transform: scale(1.05);
}

/* =======================
   محتوای صفحه
======================= */
.box3 { width: 100%; height: 512px; background: url('images/3.svg') no-repeat center/cover; }
.box4 { width: 100%; height: 720px; background: url('images/4.svg') no-repeat center/cover; }
.box5 { width: 100%; height: 296px; background: url('images/5.svg') no-repeat center/cover; }
.box6 { width: 100%; height: 125px; background: url('images/6.svg') no-repeat center/cover; }
.box7 { width: 100%; height: 862px; background: url('images/7.svg') no-repeat center/cover; }
.box8 { width: 100%; height: 125px; background: url('images/8.svg') no-repeat center/cover; }
.box11 { width: 100%; height: 607px; background: url('images/11.svg') no-repeat center/cover; }

.box9-link {
  width: 100%;
  height: 258px;
  display: block;
  background: url('images/9.svg') no-repeat center / cover;

  pointer-events: none;  /* ⬅️ لینک موقتاً غیرفعال */
  cursor: default;       /* ⬅️ ظاهر موس معمولی */
}

/* اگر img رو نگه داری هم مشکلی نیست */
.box9-link img {
  width: 100%;
  height: 100%;
  display: block;
}

/* شبکه‌های اجتماعی */
.box10 {
  width: 100%;
  height: 91px;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 24px;
  perspective: 1000px;
}

.box10 a {
  display: inline-block;
}

.box10 img {
  height: 40px;
  transition: transform 0.4s ease, filter 0.4s ease, box-shadow 0.4s ease;
}

.box10 img:active {
  transform: scale(1.3) rotateY(15deg);
  filter: brightness(1.3);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div class="box1">

  <!-- NAVBAR -->
  <div class="box2">
    <div class="nav-container">
      <img src="images/logo.png" class="nav-logo" alt="Logo">
      <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- محتوا -->
  <div class="box3"></div>
  <div class="box4"></div>
  <div class="box5"></div>
  <div class="box6"></div>
  <div class="box7"></div>
  <div class="box8"></div>

 <a href="https://example.com/michigan" class="box9-link"></a>

  <div class="box10">
    <a href="https://linkedin.com" target="_blank"><img src="images/linkedin.png" alt="LinkedIn"></a>
    <a href="https://instagram.com" target="_blank"><img src="images/instagram.png" alt="Instagram"></a>
    <a href="mailto:your-email@example.com"><img src="images/at.png" alt="Email"></a>
  </div>

  <div class="box11"></div>

</div>

<!-- منوی همبرگری -->
<div class="dropdown-menu" id="dropdownMenu">
  <a href="about.html">About Me</a>
  <a href="projects.html">My Projects</a>
  <a href="contact.html">My Contact</a>
</div>

<script>
const hamburger = document.getElementById('hamburger');
const dropdownMenu = document.getElementById('dropdownMenu');

hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  dropdownMenu.classList.toggle('open');
});

// بستن منو با کلیک بیرون
document.addEventListener('click', (e) => {
  if (!hamburger.contains(e.target) && !dropdownMenu.contains(e.target)) {
    hamburger.classList.remove('active');
    dropdownMenu.classList.remove('open');
  }
});
</script>

</body>
</html>
