<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEGOLZ Home</title>

<link href="https://fonts.googleapis.com/css2?family=Aboreto&family=Irish+Grover&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Irish Grover', cursive;
    background-color: #ecf0f1;
  }

/* ================= ناوبری ================= */
nav {
  position: sticky;
  top: 0;
  width: 100%;
  height: 117px;  
  display: flex;
  justify-content: center;   /* وسط افقی */
  align-items: center;       /* وسط عمودی */
  gap: clamp(20px, 4vw, 60px); /* فاصله بین آیتم‌ها */
  background-color: #ecf0f1;
  z-index: 100;
  border-bottom: 1px solid #ccc;
  padding: 20px 0; /* ارتفاع پویا و قابل تغییر */
  box-sizing: border-box;
}

nav a {
  text-decoration: none;
  color: black;
  font-size: clamp(18px, 2vw, 24px); /* اندازه متن نسبت به صفحه */
  text-transform: uppercase;
  font-family: 'Aboreto', cursive;
  margin: 0;
  padding: 0;
  line-height: 1; /* وسط عمودی دقیق */
  display: inline-block;
  transition: color 0.3s;
}

nav a:hover {
  color: #c5c1be; /* افکت هاور */
}

/* بخش هوم اصلاح‌شده بدون خراب شدن متن‌ها */
#box3 {
  position: relative;
  width: 100%;           /* عرض کل صفحه */
  max-width: 1440px;     /* حداکثر برای دسکتاپ */
  height: 657px;         /* همان ارتفاع قبلی ثابت */
  margin: 0 auto;
  background-color: #ffffff;
  overflow: hidden;
}

.box3-image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;           /* تصویر کل عرض */
  height: 100%;          /* تصویر کل ارتفاع */
  object-fit:  cover;
}

/* افکت‌ها همانند قبل */
@keyframes fadeSlideUp {
  0% { opacity: 0; transform: translateY(50px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes fadeSlideLeft {
  0% { opacity: 0; transform: translateX(50px); }
  100% { opacity: 1; transform: translateX(0); }
}

/* متن‌ها بدون تغییر اندازه قبلی، همان 640px و 208px */
.box3-text1 {
  position: absolute;
  top: 300px;
  left: 460px;
  width: 208px;
  color: #000000;
  font-family: 'Irish Grover', cursive;
  font-size: 65px;           /* اندازه ثابت قبلی */
  animation: fadeSlideUp 1s ease-out forwards;
  opacity: 0;
}

.box3-text2 {
  position: absolute;
  top: 90px;
  left: 1160px;
  width: 264px;
  color: #000000;
  font-family: 'Italiana', serif;
  font-size: 35px;
  line-height: 0.5;
  white-space: pre-line;
  animation: fadeSlideLeft 1s ease-out 0.5s forwards;
  opacity: 0;
}
.hamburger{
display:none;
width:30px;
height:20px;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
}

.hamburger span{
height:3px;
background:#000;
border-radius:2px;
transition:0.3s;
}

.dropdown-menu{
position:fixed;
top:117px;
left:0;
width:100%;
background:#ffffff;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 0;
opacity:0;
pointer-events:none;
transform:translateY(-20px);
transition:0.35s;
z-index:200;
}

.dropdown-menu.open{
opacity:1;
pointer-events:auto;
transform:translateY(0);
}

.dropdown-menu a{
font-family:'Aboreto', cursive;
font-size:22px;
text-decoration:none;
color:#000;
margin:10px 0;
}
.hamburger.active span:nth-child(1){
transform: rotate(45deg) translate(5px,5px);
}

.hamburger.active span:nth-child(2){
opacity:0;
}

.hamburger.active span:nth-child(3){
transform: rotate(-45deg) translate(5px,-5px);
}

/* ================== موبایل ================== */
@media (max-width: 767px) {
nav{
justify-content:space-between;
padding:0 20px;
}

nav a{
display:none;
}

.hamburger{
display:flex;
}

  #box3 { min-height: 80vh; }
  .box3-text1 { font-size: clamp(60px, 7vw, 50px); top: 43vh; left: 20%; transform: translateX(-50%); }
  .box3-text2 { font-size: clamp(18px, 4vw, 30px); top: 10vh; left: 40%; transform: translateX(-50%); line-height: 0.5; }
}

/* ================ تبلت عمودی ================ */
@media (min-width: 768px) and (max-width: 900px) and (orientation: portrait) {
  #box3 { min-height: 90vh; }
  .box3-text1 { font-size: clamp(70px, 5vw, 55px); top: 42vh; left: 14%; transform: translateX(-50%); }
  .box3-text2 { font-size: clamp(20px, 3.5vw, 35px); top: 10vh; left: 44%; transform: translateX(-50%); line-height: 0.5; }
}

/* ================ تبلت افقی ================ */
@media (min-width: 901px) and (max-width: 1024px) and (orientation: landscape) {
  #box3 { min-height: 75vh; }
  .box3-text1 { font-size: clamp(40px, 4vw, 60px); top: 40vh; left: 32%; transform: translateX(-50%); }
  .box3-text2 { font-size: clamp(22px, 3vw, 35px); top: 15vh; left: 85%; transform: translateX(-50%); line-height: 0.5; }
}

/* ================ لپ‌تاپ معمولی ================ */
@media (min-width:1025px) and (max-width:1439px) {
  #box3 { min-height: 70vh; }
  .box3-text1 { font-size: clamp(45px, 3.5vw, 65px); top: 38vh; left: 35%; transform: translateX(-50%); }
  .box3-text2 { font-size: clamp(25px, 2.5vw, 35px); top: 14vh; left: 80%; transform: translateX(-50%); line-height: 0.5; }
}

/* ================ لپ‌تاپ استاندارد ================ */
@media (min-width:1440px) and (max-width:1919px) {
 #box3 {
    width: 100vw;
    height: 100vh;
    /* اگر می‌خواهید تصویر بدون کشیده شدن باشد */
     background-size: cover;  background-position: center; }
  .box3-text1 { font-size: clamp(70px, 3vw, 70px); top: 47vh; left: 30%; transform: translateX(-50%); }
  .box3-text2 { font-size: clamp(40spx, 2vw, 38px); top: 20vh; left: 85%; transform: translateX(-50%); line-height: 0.5; }
}

/* ================ دسکتاپ بزرگ ================ */
@media (min-width:1920px) {
  #box3 {
    width: 100vw;
    height: 100vh;
    /* اگر می‌خواهید تصویر بدون کشیده شدن باشد */
     background-size: cover;  background-position: center; }
  .box3-text1 {
    font-size: clamp(80px, 2.5vw, 80px); top: 46vh;  left: 28%; transform: translateX(-50%);}
  .box3-text2 {
    font-size: clamp(32px, 2vw, 40px); top: 21vh;  left: 85%;  transform: translateX(-50%);  line-height: 0.5;}
}

</style>
</head>

<body>

<nav>

<div class="hamburger" id="hamburger">
<span></span>
<span></span>
<span></span>
</div>

<a href="about.html" target="_blank">ABOUT ME</a>
<a href="built.html" target="_blank">BUILT SYSTEMS</a>
<a href="contact.html" target="_blank">CONTACT ME</a>

</nav>

<div class="dropdown-menu" id="dropdownMenu">
<a href="about.html">ABOUT ME</a>
<a href="built.html">BUILT SYSTEMS</a>
<a href="contact.html">CONTACT ME</a>
</div>

<div id="box3">
  <img src="images/23.svg" class="box3-image" alt="HEGOLZ Image">

  <div class="box3-text1">HEGOLZ</div>

  <div class="box3-text2">
    Personal<br>
    Projects<br>
    & Design
  </div>
</div>

<script>

const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("dropdownMenu");

hamburger.addEventListener("click",()=>{
hamburger.classList.toggle("active");
menu.classList.toggle("open");
});

document.addEventListener("click",(e)=>{
if(!hamburger.contains(e.target) && !menu.contains(e.target)){
menu.classList.remove("open");
}
});

</script>

</body>
</html>
