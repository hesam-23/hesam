<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Only Layout</title>

<!-- فونت ساده و شیک -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =======================
   ریست پایه – جلوگیری از گندگی
======================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =======================
   بدنه صفحه
======================= */
body {
    background: #ffffff; /* فقط برای تست عرض */
    display: flex;
    justify-content: center;
}

/* =======================
   کانتینر اصلی موبایل
   ❗ اینجا مشکل عرض حل می‌شود
======================= */
.mobile-wrapper {
    width: 100%;
    max-width: 391px;     /* عرض استاندارد موبایل */
    background: #c4c4c4;
    overflow-x: hidden;  /* جلوگیری از اسکرول افقی */
}

/* =======================
   NAVBAR
======================= */
.navbar {
    height: 58px;
    background: #c4c4c4;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    position: relative;
    z-index: 10;
}

.logo {
    height: 20px;
}

/* =======================
   همبرگر
======================= */
.hamburger {
    width: 30px;
    height: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
}

.hamburger span {
    height: 3px;
    background: #000;
    border-radius: 2px;
    transition: 0.3s;
}

.hamburger.active span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.active span:nth-child(2) {
    opacity: 0;
}
.hamburger.active span:nth-child(3) {
    transform: rotate(-45deg) translate(6px, -6px);
}

/* =======================
   منوی کشویی
======================= */
.menu {
    position: fixed;
    top: 58px;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 391px;
    background: #ffffff; /* ⬅️ سفیدِ سفید */
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 0;
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
}

.menu.open {
    opacity: 1;
    pointer-events: auto;
}

.menu a {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    color: #000000;
    text-decoration: none;
    margin: 6px 0;
    text-transform: uppercase; /* ⬅️ حروف بزرگ */
    font-weight: 300; /* ⬅️ بولد رو برمی‌داره */
}

/* =======================
   کلاس پایه همه باکس‌ها
======================= */
.box {
    width: 100%;
    height: 321px;                 /* ارتفاع یکسان */
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;      /* ❗ جلوگیری از خراب شدن box13 */
    
}

/* فاصله بین کارت‌ها */
.separator {
    height: 82px;
    background: url("images/13.svg") no-repeat center / cover;
}

/* =======================
   باکس‌ها
======================= */
.box3  { height: 511px; background-image: url("images/12.svg"); }
.box5  { background-image: url("images/14.svg"); cursor: pointer; }
.box7  { background-image: url("images/15.svg"); cursor: pointer; }
.box9  { background-image: url("images/16.svg"); cursor: pointer; }
.box11 { background-image: url("images/17.svg"); cursor: pointer; }
.box13 { background-image: url("images/18.svg"); cursor: pointer; }
.box14 { height: 606px; background-image: url("images/19.svg"); }

/* =======================
   افکت کارت‌ها (همه یکی)
======================= */
.box5, .box7, .box9, .box11, .box13 {
    transition: transform 0.3s, filter 0.3s;
}

.box5:hover,
.box7:hover,
.box9:hover,
.box11:hover,
.box13:hover {
    transform: scale(1.04);
    filter: brightness(1.1);
}

</style>
</head>

<body>

<div class="mobile-wrapper">

    <!-- NAV -->
    <div class="navbar">
        <img src="images/logo.png" class="logo">
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- محتوا -->
    <div class="box box3"></div>
    <div class="separator"></div>

    <div class="box box5"></div>
    <div class="separator"></div>

    <div class="box box7"></div>
    <div class="separator"></div>

    <div class="box box9"></div>
    <div class="separator"></div>

    <div class="box box11"></div>
    <div class="separator"></div>

    <div class="box box13"></div>
    <div class="box box14"></div>

</div>

<!-- منو -->
 <div class="menu" id="menu">
  <a href="index.html">About Me</a>
  <a href="projects.html">My Projects</a>
  <a href="contact.html">My Contact</a>
</div>

<script>
/* کنترل منو */
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");

hamburger.onclick = () => {
    hamburger.classList.toggle("active");
    menu.classList.toggle("open");
};

/* لینک کارت‌ها */
const links = {
    box5: "project5.html",
    box7: "project7.html",
    box9: "project9.html",
    box11: "project11.html",
    box13: "project13.html"
};

Object.keys(links).forEach(cls => {
    const el = document.querySelector("." + cls);
    if (el) el.onclick = () => location.href = links[cls];
});
</script>

</body>
</html>
